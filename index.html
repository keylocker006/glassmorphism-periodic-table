<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Periodic Table</title>
    <!-- Link to the external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Page heading -->
    <h1>Periodic Table of Elements</h1>

    <!-- Container for the periodic table grid -->
    <div class="table-container">
        <div class="periodic-table" id="periodic-table"></div>
    </div>

    <!-- Legend container for element category colors -->
    <div class="legend" id="legend"></div>
    <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
        <button class="modal-close" id="modal-close">&times;</button>
        <div class="modal-content" id="modal-content"></div>
    </div>
</div>
    <!-- Link to the JavaScript file at the end of body -->
    <script src="script.js"></script>
</body>
</html>
